# 프로덕션 설정 (Railway 환경변수로 주입)
# Supabase PostgreSQL 15 연결

spring:
  datasource:
    url: jdbc:postgresql://db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres
    username: postgres
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5          # Supabase 무료 플랜 연결 수 제한
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  jpa:
    show-sql: false

logging:
  level:
    com.financebot: INFO
