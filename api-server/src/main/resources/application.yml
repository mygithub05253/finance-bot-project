spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: api-server

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway가 스키마 관리, JPA는 검증만
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

# 내부 서비스 인증 (ai-service → api-server 호출 시 헤더 검증)
internal:
  secret: ${INTERNAL_API_SECRET:dev-secret}

# CORS 허용 origin (쉼표 구분)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# 로깅
logging:
  level:
    com.financebot: INFO
    org.hibernate.SQL: WARN
