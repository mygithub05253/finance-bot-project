name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  # ==========================================
  # Spring Boot api-server 빌드 + 테스트
  # ==========================================
  api-server:
    name: api-server (Java 17 + Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-server

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Gradle 빌드 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드 및 테스트
        run: ./gradlew build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

  # ==========================================
  # Node.js ai-service 테스트
  # ==========================================
  ai-service:
    name: ai-service (Node.js 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-service/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 실행
        run: npm test

  # ==========================================
  # Next.js frontend 빌드 검증
  # ==========================================
  frontend:
    name: frontend (Next.js 15)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: Next.js 빌드 검증
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:3000
